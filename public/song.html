<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Fiche morceau</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script defer src="/app.js"></script>
</head>
<body data-page="song">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/">
        <div class="brand-logo" aria-hidden="true"></div>
        <div class="brand-copy">
          <h1>MOINS COMMUN</h1>
          <p>Samples, reprises, remixes et connexions musicales</p>
        </div>
      </a>
      <nav class="nav" data-user-nav></nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="song-layout">
        <aside class="song-side">
          <div class="card">
            <button id="songFavorite" class="btn secondary favorite-toggle" data-song-id="">♡ Ajouter aux favoris</button>
          </div>
        </aside>

        <section class="list">
          <div class="card">
            <h2 id="songTitle">Chargement…</h2>
            <div id="songMeta" class="row"></div>
            <p id="songDescription"></p>
          </div>

          <div class="card">
            <h3>Écouter</h3>
            <div id="songListening" class="row"></div>
            <div id="songPreviewPlayer" style="margin-top:16px;"></div>
          </div>

          <div class="card">
            <div class="spread">
              <h3>Relations</h3>
              <a class="btn small secondary" href="/submit">Proposer une relation</a>
            </div>
            <div id="relationshipsList" class="list"></div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Moins Commun — Base musicale collaborative</div>
  </footer>
</body>
</html>
