<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Favoris</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script defer src="/app.js"></script>
</head>
<body data-page="favorites">
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/">
        <div class="brand-logo" aria-hidden="true"></div>
        <div class="brand-copy">
          <h1>MOINS COMMUN</h1>
          <p>Samples, reprises, remixes et connexions musicales</p>
        </div>
      </a>
      <nav class="nav" data-user-nav></nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="page-header">
        <h2>Mes favoris</h2>
        <p>Retrouve les titres que tu veux garder sous la main.</p>
      </div>
      <div id="favoritesGrid" class="grid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Moins Commun — Base musicale collaborative</div>
  </footer>

</html>
