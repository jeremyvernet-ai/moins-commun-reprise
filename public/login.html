<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="login">
  <div class="auth-layout">
    <div class="panel">
      <a class="brand" href="/" style="margin-bottom:18px;display:flex;">
        <div class="logo"></div>
        <div class="brand-text">
          <h1>Moins Commun Reprise</h1>
          <p>Connexion / inscription</p>
        </div>
      </a>

      <div class="search-grid">
        <div class="field span-6">
          <label>Email</label>
          <input id="authEmail" type="email" placeholder="ton@email.com" />
        </div>
        <div class="field span-6">
          <label>Mot de passe</label>
          <input id="authPassword" type="password" placeholder="••••••••" />
        </div>
        <div class="field span-12">
          <label>Nom d'utilisateur</label>
          <input id="authUsername" type="text" placeholder="uniquement pour l'inscription" />
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="loginBtn">Se connecter</button>
        <button class="btn secondary" id="signupBtn">Créer un compte</button>
      </div>

      <div id="authNotice" class="notice" style="margin-top:16px;">Connecte-toi pour gérer tes favoris. Un compte admin peut accéder au panneau d'administration.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script src="/supabase-app.js"></script>
</body>
</html>
